<!DOCTYPE html>
<html>
<body>

<h2>Using a Full URL File Path</h2>
<img src="https://www.w3schools.com/images/picture.jpg" alt="Mountain" style="width:300px">

<!--rutas de archivo relativas
el archivo apunta a un archivo en la carpeta de imágenes ubicada en la raíz del sitio web actua-->
<img src="/images/picture.jpg" alt="Mountain">

<!-- la ruta del archivo apunta a un archivo en la carpeta de imágenes ubicada en la carpeta actual-->
<img src="images/picture.jpg" alt="Mountain">

<!--la ruta del archivo apunta a un archivo en la carpeta de imágenes ubicada en la carpeta un nivel por encima de la carpeta actual-->
<img src="../images/picture.jpg" alt="Mountain">

</body>
</html>
