<!--elemento input-->
<!DOCTYPE html>
<html>
<body>

<h2>The input Element</h2>

<form action="/action_page.php">
  <label for="fname">First name:</label><br>
  <input type="text" id="fname" name="fname"><br><br>
  <input type="submit" value="Submit">
</form>

</body>
</html>

<!--elemento select-->
<label for="cars">Choose a car:</label>
<select id="cars" name="cars">
  <option value="volvo">Volvo</option> <!--define una opción que se puede seleccionar-->
  <option value="saab">Saab</option>
  <option value="fiat">Fiat</option>
  <option value="audi">Audi</option>
</select>

<!--valores visibles-->
<label for="cars">Choose a car:</label>
<select id="cars" name="cars" size="3"> <!--size  para especificar el número de valores visibles-->
  <option value="volvo">Volvo</option>
  <option value="saab">Saab</option>
  <option value="fiat">Fiat</option>
  <option value="audi">Audi</option>
</select>

<!--selecciones multiples-->
<!--permitir al usuario seleccionar más de un valor-->
<label for="cars">Choose a car:</label>
<select id="cars" name="cars" size="4" multiple>
  <option value="volvo">Volvo</option>
  <option value="saab">Saab</option>
  <option value="fiat">Fiat</option>
  <option value="audi">Audi</option>
</select>

<!--elemento <textarea>-->
<!--rowsatributo especifica el número de líneas visibles en un área de texto-->
<!--colsatributo especifica el ancho visible de un área de texto-->
<textarea name="message" rows="10" cols="30">
The cat was playing in the garden.
</textarea>

<!--elemento button-->
<button type="button" onclick="alert('Hello World!')">Click Me!</button>

<!--elementos <fieldset> y <legend>-->
<!--<fieldset>elemento se utiliza para agrupar datos relacionados en un formulario.

El <legend>elemento define un título-->
<form action="/action_page.php">
  <fieldset>
    <legend>Personalia:</legend>
    <label for="fname">First name:</label><br>
    <input type="text" id="fname" name="fname" value="John"><br>
    <label for="lname">Last name:</label><br>
    <input type="text" id="lname" name="lname" value="Doe"><br><br>
    <input type="submit" value="Submit">
  </fieldset>
</form>

<!--elemento <datalist>-->
<form action="/action_page.php">
  <input list="browsers">
  <datalist id="browsers">
    <option value="Edge">
    <option value="Firefox">
    <option value="Chrome">
    <option value="Opera">
    <option value="Safari">
  </datalist>
</form>

<!--elemento <output>-->
<!--Realiza un cálculo y muestra el resultado-->

<form action="/action_page.php"
  oninput="x.value=parseInt(a.value)+parseInt(b.value)">
  0
  <input type="range"  id="a" name="a" value="50">
  100 +
  <input type="number" id="b" name="b" value="50">
  =
  <output name="x" for="a b"></output>
  <br><br>
  <input type="submit">
</form>
