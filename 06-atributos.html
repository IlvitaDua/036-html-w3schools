<!-- atributo href-->
<a href="https://www.w3schools.com">Visit W3Schools.com!</a>

<!-- atributo src-->
<img src="img_girl.jpg">

<!-- atributo ancho y alto-->
<img src="img_girl.jpg" width="500" height="600">

<!-- imagen que no existe -->
<img src="img_typo.jpg" alt="Girl with a jacket">

<!-- atributos de estilo-->
<p style="color:rgb(0, 183, 255);">This is a red paragraph.</p>

<!--atributo lang-->
<!DOCTYPE html>
<html lang="en">
<body>
</body>
</html>

<!-- atributo title-->
<p title="I'm a tooltip">This is a paragraph.</p>

<!-- comillas simples o dobles-->
<p title='John "ShotGun" Nelson'>
<p title="John 'ShotGun' Nelson"></p>

<!-- Todos los elementos HTML pueden tener atributos.
El hrefatributo <a>especifica la URL de la página a la que apunta el enlace.
El srcatributo <img>especifica la ruta a la imagen que se mostrará.
Los atributos y widthproporcionan información de tamaño para las imágenesheight<img>
El altatributo <img>proporciona un texto alternativo para la imagen.
El styleatributo se utiliza para agregar estilos a un elemento, como color, fuente, tamaño y más.
El langatributo de la <html>etiqueta declara el idioma de la página web.
El titleatributo define información adicional sobre un elemento.-->
